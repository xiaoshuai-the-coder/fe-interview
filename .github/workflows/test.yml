name: Unit Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

  auto-merge-to-master:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Create PR from dev to master
        uses: peter-evans/create-pull-request@v6
        with:
          title: 'chore: auto-merge dev to master'
          head: dev
          base: master
          body: 'Auto-merged from dev after passing tests'
          token: ${{ secrets.GITHUB_TOKEN }}
